openapi: 3.0.0
info:
  title: Blockchain.com Explorer API
  version: 1.0.0
  description: API for retrieving data from the Blockchain.com explorer.
servers:
  - url: https://blockchain.info
paths:
  /latestblock:
    get:
      summary: Get the latest block
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Block'
  /rawblock/{block_hash}:
    get:
      summary: Get a single block by hash
      parameters:
        - name: block_hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
  /rawtx/{tx_hash}:
    get:
      summary: Get a single transaction by hash
      parameters:
        - name: tx_hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
  /rawaddr/{bitcoin_address}:
    get:
      summary: Get data for a single address
      parameters:
        - name: bitcoin_address
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Successful response
components:
  schemas:
    Block:
      type: object
      properties:
        hash:
          type: string
        time:
          type: integer
        block_index:
          type: integer
        height:
          type: integer
        txIndexes:
          type: array
          items:
            type: integer
